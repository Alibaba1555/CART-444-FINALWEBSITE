<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="grain"></div>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <header>
    <div class="logo">Your Name</div>
    <nav>
      <a href="#">Work</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <div class="scene">

    <div class="watermark">Your Name</div>

    <div class="veil-line"></div>

    <div class="tagline">Photographer &nbsp;·&nbsp; Designer &nbsp;·&nbsp; Filmmaker &nbsp;·&nbsp; Developer</div>

    <div class="dot" style="width:3px;height:3px;top:21%;left:17%;opacity:.14;"></div>
    <div class="dot" style="width:2px;height:2px;top:34%;left:71%;opacity:.09;"></div>
    <div class="dot" style="width:4px;height:4px;top:67%;left:43%;opacity:.07;"></div>
    <div class="dot" style="width:2px;height:2px;top:77%;left:84%;opacity:.11;"></div>
    <div class="dot" style="width:3px;height:3px;top:29%;left:56%;opacity:.06;"></div>
    <div class="dot" style="width:2px;height:2px;top:55%;left:28%;opacity:.08;"></div>
    <div class="dot" style="width:3px;height:3px;top:82%;left:62%;opacity:.07;"></div>

    <div class="blobs" id="blobs">

      <div class="blob" id="blob-photography"
        style="
          left: 12%; top: 36%;
          animation: fa 3.9s ease-in-out infinite;
          animation-delay: 0s;
          opacity: 0;
          animation: blob-enter .9s .15s ease forwards, fa 3.9s 1.1s ease-in-out infinite;
        "
        data-category="Photography"
        data-color="#789262"
        data-works='[
          {"title":"Untitled Series No. 1","year":"2024"},
          {"title":"Winter Light Study","year":"2024"},
          {"title":"Portrait, Berlin","year":"2023"},
          {"title":"Still Life with Glass","year":"2023"},
          {"title":"Landscape, Morning","year":"2022"},
          {"title":"Archive 12–18","year":"2021"}
        ]'>
        <div class="blob-shape">
          <svg width="178" height="248" viewBox="0 0 178 248" fill="none" style="overflow:visible">
            <path d="M89,8C117,8 162,105 162,129C162,216 122,240 89,240C56,240 16,216 16,129C16,105 61,8 89,8Z" fill="#789262" opacity=".84"/>
          </svg>
          <div class="blob-inner">
            <span class="blob-num">01</span>
            <span class="blob-label">Photography</span>
          </div>
        </div>
      </div>

      <div class="blob" id="blob-design"
        style="
          left: 34%; top: 53%;
          opacity: 0;
          animation: blob-enter .9s .35s ease forwards, fb 4.3s 1.3s ease-in-out infinite;
        "
        data-category="Design"
        data-color="#549688"
        data-works='[
          {"title":"Identity, Studio Aura","year":"2024"},
          {"title":"System, Forma","year":"2024"},
          {"title":"Typeface Exploration","year":"2023"},
          {"title":"Spatial Interface","year":"2023"},
          {"title":"Print Series III","year":"2022"},
          {"title":"Brand, Elsewhere","year":"2022"}
        ]'>
        <div class="blob-shape">
          <svg width="214" height="222" viewBox="0 0 214 222" fill="none" style="overflow:visible">
            <path d="M107,10C143,10 201,94 201,114C201,190 149,210 107,210C65,210 13,190 13,114C13,94 71,10 107,10Z" fill="#549688" opacity=".84"/>
          </svg>
          <div class="blob-inner">
            <span class="blob-num">02</span>
            <span class="blob-label">Design</span>
          </div>
        </div>
      </div>

      <div class="blob" id="blob-film"
        style="
          left: 56%; top: 33%;
          opacity: 0;
          animation: blob-enter .9s .55s ease forwards, fc 3.6s 1.5s ease-in-out infinite;
        "
        data-category="Film"
        data-color="#611e12"
        data-works='[
          {"title":"Short, 2024","year":"2024"},
          {"title":"Documentary Fragment","year":"2023"},
          {"title":"Collaborative Loop","year":"2023"},
          {"title":"Movement Study","year":"2022"},
          {"title":"Archival Edit","year":"2022"},
          {"title":"Silent, 16mm","year":"2021"}
        ]'>
        <div class="blob-shape">
          <svg width="158" height="256" viewBox="0 0 158 256" fill="none" style="overflow:visible">
            <path d="M79,5C105,5 147,108 147,132C147,225 110,250 79,250C48,250 11,225 11,132C11,108 53,5 79,5Z" fill="#611e12" opacity=".88"/>
          </svg>
          <div class="blob-inner">
            <span class="blob-num">03</span>
            <span class="blob-label">Film</span>
          </div>
        </div>
      </div>

      <div class="blob" id="blob-game"
        style="
          left: 75%; top: 47%;
          opacity: 0;
          animation: blob-enter .9s .75s ease forwards, fd 4.7s 1.7s ease-in-out infinite;
        "
        data-category="Game"
        data-color="#f2be45"
        data-works='[
          {"title":"Prototype Alpha","year":"2024"},
          {"title":"Interactive Fiction No.4","year":"2024"},
          {"title":"Simulation, Void","year":"2023"},
          {"title":"Puzzle — Space","year":"2023"},
          {"title":"Narrative Engine","year":"2022"},
          {"title":"Browser Experiment","year":"2021"}
        ]'>
        <div class="blob-shape">
          <svg width="200" height="230" viewBox="0 0 200 230" fill="none" style="overflow:visible">
            <path d="M100,7C134,7 190,97 190,119C190,198 140,222 100,222C60,222 10,198 10,119C10,97 66,7 100,7Z" fill="#f2be45" opacity=".82"/>
          </svg>
          <div class="blob-inner">
            <span class="blob-num">04</span>
            <span class="blob-label">Game</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="hint">Select a category to explore</div>

  <div class="panel" id="panel">
    <div class="panel-bg"></div>
    <div class="panel-strip" id="panel-strip"></div>
    <button class="close-btn" id="close-btn">← Back</button>

    <div class="panel-content">
      <div class="panel-header">
        <h1 class="panel-title" id="panel-title">Photography</h1>
        <div class="panel-meta">
          <div class="panel-meta-count" id="panel-count">06 Works</div>
          <div class="panel-meta-year">2021–2024</div>
        </div>
      </div>
      <div class="works-grid" id="works-grid"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
